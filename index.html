<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>PORTAL SEMAK E-SIJIL MULTI EVENT</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Orbitron;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

background:
linear-gradient(
rgba(0,0,0,.72),
rgba(0,0,0,.82)
),

url("background.png");

background-size:cover;

background-position:center;

background-repeat:no-repeat;

color:white;

}

.box{

width:100%;

max-width:560px;

padding:36px;

border-radius:28px;

background:rgba(15,20,35,.72);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.12);

box-shadow:
0 0 35px rgba(0,229,255,.25);

text-align:center;

}

.logo img{

width:160px;

max-width:100%;

margin-bottom:15px;

filter:
drop-shadow(0 0 16px #00e5ff);

}

h1{

font-size:28px;

color:#00e5ff;

margin-bottom:8px;

}

.sub{

color:#bbb;

font-size:13px;

margin-bottom:28px;

}

input{

width:100%;

padding:18px;

border:none;

outline:none;

border-radius:16px;

background:#111827;

color:white;

font-size:16px;

margin-bottom:16px;

text-align:center;

}

button{

width:100%;

padding:18px;

border:none;

border-radius:16px;

cursor:pointer;

font-size:16px;

font-weight:700;

color:white;

background:

linear-gradient(
90deg,
#00e5ff,
#ff00ff
);

}

button:hover{

transform:translateY(-1px);

}

.card{

margin-top:24px;

padding:22px;

border-radius:20px;

background:#10192b;

animation:fade .3s;

}

.card h2{

color:#00e5ff;

margin-bottom:12px;

}

.card p{

margin-bottom:10px;

font-size:14px;

color:#ddd;

word-break:break-word;

}

.download{

display:inline-block;

margin-top:14px;

padding:14px 26px;

border-radius:14px;

text-decoration:none;

background:

linear-gradient(
90deg,
#00e5ff,
#ff00ff
);

color:white;

}

.loading{

padding:22px;

}

.footer{

margin-top:20px;

font-size:11px;

color:#888;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(10px);

}

to{

opacity:1;

transform:none;

}

}

</style>

</head>

<body>

<audio id="successSound">
<source src="success.mp3" type="audio/mpeg">
</audio>

<div class="box">

<div class="logo">

<img src="logo.png">

</div>

<h1>
PORTAL SEMAK E-SIJIL
</h1>

<div class="sub">
MULTI EVENT SYSTEM
</div>

<input
id="ic"
placeholder="MASUKKAN NO KAD PENGENALAN"
>

<button onclick="semak()">
SEMAK SIJIL
</button>

<div id="result"></div>

<div class="footer">

POWERED BY DIGITAL EVENT SYSTEM

</div>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbyPPzQJ3RJFeM_v-1pbs3LP2oZrv_CcKsnrCYGZo6A8IIJG8F90EOF71xsIXQDFi0oU5w/exec";

async function semak(){

const ic =
document
.getElementById("ic")
.value
.trim();

const result =
document
.getElementById("result");

if(!ic){

result.innerHTML=`

<div class="card">

<h2>
MASUKKAN IC
</h2>

</div>

`;

return;

}

result.innerHTML=`

<div class="card loading">

MENCARI SIJIL...

</div>

`;

try{

const params =
new URLSearchParams(
window.location.search
);

const event =
params.get("event")
||
"lextai";

const response =
await fetch(
API+
"?event="+
encodeURIComponent(event)+
"&ic="+
encodeURIComponent(ic)
);

const data =
await response.json();

if(data.success){

const audio =
document
.getElementById(
"successSound"
);

if(audio){

audio
.play()
.catch(()=>{});

}

result.innerHTML=`

<div class="card">

<h2>
${data.nama||"-"}
</h2>

<p>

${data.program||"-"}

</p>

<a
class="download"
href="${data.pdf}"
target="_blank"
>

MUAT TURUN SIJIL

</a>

</div>

`;

}else{

result.innerHTML=`

<div class="card">

<h2>

SIJIL TIDAK DIJUMPAI

</h2>

</div>

`;

}

}catch(e){

result.innerHTML=`

<div class="card">

<h2>

RALAT SISTEM

</h2>

<p>

Semakan gagal.

</p>

</div>

`;

}

}

const url =
new URLSearchParams(
window.location.search
);

const autoIC =
url.get("ic");

if(autoIC){

document
.getElementById("ic")
.value=
autoIC;

setTimeout(
semak,
500
);

}

</script>

</body>
</html>
