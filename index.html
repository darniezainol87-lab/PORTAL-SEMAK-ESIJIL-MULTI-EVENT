<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>PORTAL SEMAK E-SIJIL</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:url("background.png") center/cover;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
width:90%;
max-width:500px;
padding:30px;
background:rgba(0,0,0,.75);
border-radius:20px;
color:#fff;
text-align:center;
}

.logo{
width:150px;
}

input{
width:100%;
padding:16px;
margin:15px 0;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:10px;
cursor:pointer;
}

.card{
margin-top:20px;
padding:20px;
background:#111;
border-radius:15px;
}

a{
display:inline-block;
margin-top:15px;
padding:12px 20px;
background:#00bfff;
color:#fff;
text-decoration:none;
border-radius:10px;
}

</style>
</head>

<body>

<audio id="successSound">
<source src="success.mp3">
</audio>

<div class="box">

<img src="logo.png" class="logo">

<h2>PORTAL SEMAK E-SIJIL</h2>

<p>MULTI EVENT SYSTEM</p>

<input
id="ic"
placeholder="MASUKKAN IC">

<button onclick="semak()">
SEMAK SIJIL
</button>

<div id="result"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyPPzQJ3RJFeM_v-1pbs3LP2oZrv_CcKsnrCYGZo6A8IIJG8F90EOF71xsIXQDFi0oU5w/exec";

async function semak(){

const result =
document.getElementById("result");

const ic =
document.getElementById("ic")
.value
.trim();

if(!ic){

result.innerHTML=`
<div class="card">
Masukkan No IC
</div>
`;

return;

}

result.innerHTML=`
<div class="card">
Mencari sijil...
</div>
`;

try{

const event =
new URLSearchParams(
window.location.search
).get("event")
||
"lextai";

const url =
`${API}?event=${encodeURIComponent(event)}&ic=${encodeURIComponent(ic)}`;

const response =
await fetch(
url,
{
redirect:"follow"
}
);

const raw =
await response.text();

const data =
JSON.parse(raw);

if(data.success){

const audio =
document.getElementById(
"successSound"
);

if(audio){

audio.play().catch(()=>{});

}

result.innerHTML=`

<div class="card">

<h3>
${data.nama}
</h3>

<p>
${data.program}
</p>

<a
href="${data.pdf}"
target="_blank">

MUAT TURUN SIJIL

</a>

</div>

`;

}else{

result.innerHTML=`

<div class="card">

${data.message}

</div>

`;

}

}catch(err){

console.log(err);

result.innerHTML=`

<div class="card">

SAMBUNGAN API GAGAL

</div>

`;

}

}

const auto =
new URLSearchParams(
window.location.search
).get("ic");

if(auto){

document
.getElementById("ic")
.value=
auto;

setTimeout(
semak,
500
);

}

</script>

</body>
</html>
