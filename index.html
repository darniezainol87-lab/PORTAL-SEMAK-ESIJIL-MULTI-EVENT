<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PORTAL SEMAK E-SIJIL VIP</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Orbitron',sans-serif;

background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.8)),
url('background.png');

background-size:cover;
background-position:center;
background-repeat:no-repeat;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

color:white;

}

/* ANIMATED GLOW */

body::before{

content:'';

position:absolute;

width:100%;
height:100%;

background:
radial-gradient(circle at top left,#00f0ff22,transparent 40%),
radial-gradient(circle at bottom right,#ff00ff22,transparent 40%);

animation:glow 6s infinite alternate;

z-index:0;

}

@keyframes glow{

0%{
transform:scale(1);
}

100%{
transform:scale(1.1);
}

}

.container{

position:relative;
z-index:2;

width:90%;
max-width:500px;

padding:35px;

border-radius:25px;

backdrop-filter:blur(15px);

background:rgba(255,255,255,0.06);

border:1px solid rgba(255,255,255,0.15);

box-shadow:
0 0 20px #00e5ff55,
0 0 50px #ff00ff33;

text-align:center;

}

/* LOGO */

.logo img{

width:160px;
max-width:100%;

margin-bottom:20px;

filter:
drop-shadow(0 0 15px #00e5ff)
drop-shadow(0 0 30px #ff00ff);

animation:float 3s ease-in-out infinite;

}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0px);
}

}

.title{

font-size:24px;
font-weight:700;

margin-bottom:10px;

color:#00e5ff;

text-shadow:0 0 10px #00e5ff;

}

.subtitle{

font-size:13px;
color:#ccc;

margin-bottom:30px;

}

/* INPUT */

input{

width:100%;

padding:16px;

border:none;
outline:none;

border-radius:15px;

background:#11182c;

color:white;

font-size:16px;

margin-bottom:20px;

text-align:center;

box-shadow:0 0 15px #00e5ff33;

}

/* BUTTON */

button{

width:100%;

padding:16px;

border:none;

border-radius:15px;

background:linear-gradient(90deg,#00e5ff,#ff00ff);

color:white;

font-size:16px;
font-weight:bold;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:scale(1.03);

box-shadow:
0 0 20px #00e5ff88,
0 0 40px #ff00ff55;

}

/* RESULT CARD */

.card{

margin-top:25px;

padding:25px;

border-radius:20px;

background:#0e1529;

border:1px solid #00e5ff33;

animation:fade 0.4s ease;

}

.card h2{

color:#00e5ff;

margin-bottom:15px;

}

.card p{

margin-bottom:10px;

font-size:14px;

color:#ddd;

}

.card a{

display:inline-block;

margin-top:15px;

padding:12px 25px;

border-radius:12px;

text-decoration:none;

background:linear-gradient(90deg,#00e5ff,#ff00ff);

color:white;

font-weight:bold;

transition:0.3s;

}

.card a:hover{

transform:scale(1.05);

}

/* LOADING */

.loading{

margin-top:20px;

font-size:15px;

color:#00e5ff;

animation:blink 1s infinite;

}

@keyframes blink{

50%{
opacity:0.5;
}

}

/* FOOTER */

.footer{

margin-top:25px;

font-size:12px;

color:#888;

}

/* FADE */

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<!-- AUDIO -->

<audio id="successSound">
<source src="success.mp3" type="audio/mpeg">
</audio>

<!-- MAIN -->

<div class="container">

<div class="logo">
<img src="logo.png" alt="Logo">
</div>

<div class="title">
PORTAL SEMAK E-SIJIL
</div>

<div class="subtitle">
MULTI EVENT VIP SYSTEM 2026
</div>

<input
type="text"
id="ic"
placeholder="MASUKKAN NO KAD PENGENALAN"
/>

<button onclick="semak()">
SEMAK SIJIL
</button>

<div id="result"></div>

<div class="footer">
POWERED BY VIP DIGITAL CERTIFICATE SYSTEM
</div>

</div>

<script>

/* API */

const API = "https://script.google.com/macros/s/AKfycbyPPzQJ3RJFeM_v-1pbs3LP2oZrv_CcKsnrCYGZo6A8IIJG8F90EOF71xsIXQDFi0oU5w/exec";

/* SEMAK FUNCTION */

async function semak(){

const ic = document.getElementById("ic").value.trim();

const result = document.getElementById("result");

if(!ic){

result.innerHTML = `
<div class="card">
<h2>SILA MASUKKAN IC</h2>
</div>
`;

return;

}

result.innerHTML = `
<div class="loading">
MENCARI SIJIL...
</div>
`;

try{

const urlParams = new URLSearchParams(window.location.search);

const event = urlParams.get("event") || "lextai";

const res = await fetch(
API + "?event=" + event + "&ic=" + encodeURIComponent(ic)
);

const data = await res.json();

if(data.success){

/* PLAY SOUND */

document.getElementById("successSound").play();

result.innerHTML = `

<div class="card">

<h2>${data.nama}</h2>

<p>${data.program}</p>

<p><b>EVENT:</b> ${data.event}</p>

<p><b>STATUS:</b> ${data.status}</p>

<p><b>EMAIL:</b> ${data.email}</p>

<p><b>NO TEL:</b> ${data.phone}</p>

<a href="${data.pdf}" target="_blank">
MUAT TURUN SIJIL
</a>

</div>

`;

}else{

result.innerHTML = `

<div class="card">

<h2>SIJIL TIDAK DIJUMPAI</h2>

<p>
Sila semak nombor kad pengenalan anda
</p>

</div>

`;

}

}catch(error){

result.innerHTML = `

<div class="card">

<h2>RALAT SISTEM</h2>

<p>
Sila cuba sebentar lagi
</p>

</div>

`;

}

}

/* AUTO QR DETECT */

const urlParams = new URLSearchParams(window.location.search);

const icParam = urlParams.get("ic");

if(icParam){

document.getElementById("ic").value = icParam;

setTimeout(()=>{

semak();

},500);

}

</script>

</body>
</html>
