<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>PORTAL SEMAK E-SIJIL MULTI EVENT</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial,sans-serif;

background:
linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.75)
),

url("background.png");

background-size:cover;

background-position:center;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}

.box{

width:100%;

max-width:520px;

padding:35px;

background:
rgba(10,15,30,.80);

border-radius:25px;

text-align:center;

color:white;

backdrop-filter:blur(15px);

}

.logo{

width:150px;

margin-bottom:15px;

}

h1{

font-size:28px;

margin-bottom:8px;

}

.sub{

color:#c9c9c9;

margin-bottom:24px;

}

input{

width:100%;

padding:18px;

border:none;

border-radius:12px;

margin-bottom:16px;

font-size:16px;

text-align:center;

}

button{

width:100%;

padding:18px;

border:none;

border-radius:12px;

cursor:pointer;

font-size:16px;

font-weight:bold;

background:
linear-gradient(
90deg,
#00c3ff,
#7b61ff
);

color:white;

}

.card{

margin-top:22px;

padding:22px;

border-radius:16px;

background:#111827;

}

.card h2{

margin-bottom:10px;

}

.card p{

margin-bottom:10px;

word-break:break-word;

}

.download{

display:inline-block;

margin-top:10px;

padding:14px 24px;

background:
linear-gradient(
90deg,
#00c3ff,
#7b61ff
);

color:white;

text-decoration:none;

border-radius:10px;

}

.footer{

margin-top:18px;

font-size:11px;

color:#aaa;

}

</style>

</head>

<body>

<audio id="successSound">
<source src="success.mp3" type="audio/mpeg">
</audio>

<div class="box">

<img
src="logo.png"
class="logo"
>

<h1>

PORTAL SEMAK E-SIJIL

</h1>

<div class="sub">

MULTI EVENT SYSTEM

</div>

<input
id="ic"
placeholder="MASUKKAN NO KAD PENGENALAN"
>

<button onclick="semak()">

SEMAK SIJIL

</button>

<div id="result"></div>

<div class="footer">

POWERED BY DIGITAL EVENT SYSTEM

</div>

</div>

<script>

const API = https://script.google.com/macros/s/AKfycbx_CBwrJqThluEJ_QUbBBQpspi1l5w5M79k_FbPXM3j2ZMkKc9hr3ybSnz-euPg2VMj/exec

async function semak(){

const result =
document.getElementById(
"result"
);

const ic =
document
.getElementById(
"ic"
)
.value
.trim();

if(!ic){

result.innerHTML=
`

<div class="card">

Masukkan No Kad Pengenalan

</div>

`;

return;

}

result.innerHTML=
`

<div class="card">

Mencari sijil...

</div>

`;

try{

const params =
new URLSearchParams(
window.location.search
);

const event =
params.get("event")
||
"lextai";

const url =
API +
"?event=" +
encodeURIComponent(event) +
"&ic=" +
encodeURIComponent(ic);

const res =
await fetch(
url,
{
method:"GET",
redirect:"follow"
}
);

const text =
await res.text();

let data;

try{

data =
JSON.parse(text);

}catch{

throw new Error(
"RESPON API TIDAK SAH"
);

}

if(data.success){

const sound =
document.getElementById(
"successSound"
);

if(sound){

sound.play()
.catch(()=>{});

}

result.innerHTML=
`

<div class="card">

<h2>

${data.nama}

</h2>

<p>

${data.program}

</p>

<a
class="download"
href="${data.pdf}"
target="_blank"
>

MUAT TURUN SIJIL

</a>

</div>

`;

}else{

result.innerHTML=
`

<div class="card">

${data.message}

</div>

`;

}

}catch(err){

console.log(err);

result.innerHTML=
`

<div class="card">

RALAT SISTEM

<br><br>

${err.message}

</div>

`;

}

}

const auto =
new URLSearchParams(
window.location.search
)
.get("ic");

if(auto){

document
.getElementById(
"ic"
)
.value =
auto;

setTimeout(
semak,
500
);

}

</script>

</body>
</html>
